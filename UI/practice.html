<!DOCTYPE html>
<html>
<head>
<title>Device Specifications</title>

<style>
* {
  box-sizing: border-box;
  color: black;
  background-color: thistle;
  }
table{
  border: 4px solid black; 
  width: 500px;/* outer border */
}

th, td{
  border: 3px solid black;    /* inner borders */
  padding: 10px;
  text-align: center;
}
th{
    background-color: #d9d9d9;
}
</style>

</head>

<body>

<table>
<thead>
<tr>
    <th rowspan="2">Device</th>
    <th rowspan="2">Brand</th>
    <th colspan="2">Specifications</th>
</tr>

<tr>
    <th>Model</th>
    <th>Storage</th>
</tr>
</thead>
<tr>
    <td rowspan="2"style="background-color: #f2f2f2;">Smartphone</td>
    <td rowspan="2">Apple</td>
    <td>iPhone 12 Pro</td>
    <td>256GB</td>
</tr>

<tr>
    <td>iPhone SE</td>
    <td>128GB</td>
</tr>

<tr>
    <td>Laptop</td>
    <td>HP</td>
    <td colspan="2">15.6" Display</td>
</tr>

<tr>
    <td>Tablet</td>
    <td>Samsung</td>
    <td colspan="2">10.5" Display</td>
</tr>

</table>

</body>
</html>
